<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Message</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f8f6f2;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 45px;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 520px;
    width: 90%;
    animation: fadeIn 1s ease;
}

h1 {
    font-family: 'Playfair Display', serif;
}

p {
    color: #6b6b6b;
    min-height: 70px;
}

button {
    margin-top: 25px;
    padding: 12px 26px;
    border-radius: 30px;
    border: none;
    background: #6b705c;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.hidden { display: none; }

.no {
    background: #e8e4df;
    color: #555;
    position: absolute;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes glitch {
    0% {transform: translate(0);}
    20% {transform: translate(-2px,2px);}
    40% {transform: translate(2px,-2px);}
    60% {transform: translate(-2px,1px);}
    80% {transform: translate(2px,1px);}
    100% {transform: translate(0);}
}

.glitch {
    animation: glitch 0.3s;
}

.chat {
    text-align: left;
    margin-top: 20px;
    font-size: 0.9rem;
}

.msg {
    margin: 8px 0;
    padding: 10px 14px;
    border-radius: 15px;
    max-width: 70%;
}

.her {
    background: #eae7e1;
}

.me {
    background: #6b705c;
    color: white;
    margin-left: auto;
}

.dot {
    position: fixed;
    width: 5px;
    height: 5px;
    background: #d6d3cd;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1 id="title">Opening file...</h1>
<p id="text"></p>

<div id="chat" class="chat hidden"></div>

<button id="nextBtn" onclick="nextStep()">continue</button>

<div id="choices" class="hidden">
    <button onclick="forgive()">okay... I forgive you</button>
    <button class="no" id="noBtn" onmouseover="moveNo()">no.</button>
</div>

<p id="final" class="hidden"></p>

</div>
</div>

<script>
const messages = [
"Scanning recent conversations...",
"Found: one very important person.",
"Found: multiple messages from her.",
"Found: zero replies from you.",
"...this is not looking good.",
"Attempting to justify behavior...",
"Error: you were just ignoring texts.",
"System verdict: you messed up.",
"But also...",
"You actually care about her a lot.",
"So maybe... fix it properly."
];

let step = 0;

function typeText(text, element, speed = 28) {
    element.innerHTML = "";
    let i = 0;
    const interval = setInterval(() => {
        element.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, speed);
}

function nextStep() {
    const textEl = document.getElementById("text");

    if (step < messages.length) {
        typeText(messages[step], textEl);

        if (messages[step].includes("messed up")) {
            textEl.classList.add("glitch");
        }

        step++;
    } else if (step === messages.length) {
        showChat();
        step++;
    } else {
        document.getElementById("nextBtn").classList.add("hidden");
        document.getElementById("title").innerText = "Okay, seriously now";
        document.getElementById("text").innerText =
        "I’m really sorry. You didn’t deserve to be ignored. I should’ve replied, and I’ll do better.";

        document.getElementById("choices").classList.remove("hidden");
    }
}

function showChat() {
    const chat = document.getElementById("chat");
    chat.classList.remove("hidden");

    chat.innerHTML = `
        <div class="msg her">hey??</div>
        <div class="msg her">are you alive</div>
        <div class="msg her">wow okay 😭</div>
    `;
}

function forgive() {
    document.getElementById("choices").classList.add("hidden");
    const final = document.getElementById("final");
    final.classList.remove("hidden");

    final.innerText = "Thank you. I owe you coffee. Or food. Or both.";

    createDots();
}

function moveNo() {
    const btn = document.getElementById("noBtn");
    const x = Math.random() * 250 - 125;
    const y = Math.random() * 250 - 125;
    btn.style.transform = `translate(${x}px, ${y}px)`;
}

function createDots() {
    setInterval(() => {
        const dot = document.createElement("div");
        dot.classList.add("dot");
        dot.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(dot);

        setTimeout(() => dot.remove(), 6000);
    }, 200);
}
</script>

</body>
</html>
